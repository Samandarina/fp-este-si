<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudio para vagos</title>
<style>
:root {
  --bg:#f4f7fb; --card:#fff; --primary:#075f7a; --primary-dark:#044b61;
  --accent:#ff7a2f; --text:#1f2933; --muted:#6b7280; --border:#d9e2ec;
  --good:#15803d; --bad:#b91c1c; --soft:#eef6f9;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(135deg,#075f7a,#0b7897);color:white;padding:38px 20px;text-align:center}
header h1{margin:0;font-size:2.35rem}
header p{margin:10px 0 0;opacity:.92}
main{max-width:1080px;margin:30px auto;padding:0 20px 50px}
.screen{display:none} .screen.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
.card,.panel,.quiz-panel{background:white;border:1px solid var(--border);border-radius:18px;box-shadow:0 8px 20px rgba(0,0,0,.06)}
.card{padding:24px;cursor:pointer;transition:.15s}
.card:hover,.test-card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,.1)}
.card .icon{font-size:2rem;margin-bottom:10px}
.card h2,.test-card h3{margin:0 0 8px}
.card p,.test-card p{margin:0;color:var(--muted);line-height:1.45}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
button{font-family:inherit;border:none;border-radius:12px;padding:10px 14px;font-weight:bold;cursor:pointer}
.back{background:var(--primary);color:white;border-radius:999px}
.primary{background:var(--accent);color:white;margin-top:16px}
.small{background:var(--primary);color:white;font-size:.85rem;margin-top:8px}
.folder-list{background:white;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 8px 20px rgba(0,0,0,.05)}
.folder-item{background:var(--primary);color:white;padding:18px 22px;border-bottom:3px solid white;cursor:pointer;font-size:1.05rem;display:flex;gap:10px}
.folder-item:hover{background:var(--primary-dark)} .folder-item:last-child{border-bottom:none}
.panel{padding:24px}
.section-title{margin:28px 0 12px;color:var(--primary-dark)}
.test-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.test-card{background:white;border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.05);position:relative;overflow:hidden}
.test-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:7px;background:var(--accent)}
.badge{display:inline-block;background:var(--soft);color:var(--primary-dark);padding:5px 9px;border-radius:999px;font-size:.78rem;font-weight:bold;margin-top:12px}
.quiz-panel{padding:24px}
.question{border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px;background:white}
.question h3{margin:0 0 14px;font-size:1.05rem}
.option{display:block;padding:10px 12px;border:1px solid var(--border);border-radius:12px;margin:8px 0;cursor:pointer;background:#fafafa}
.option:hover{background:#eef6f9}
.exp{display:none;margin-top:12px;background:#fff7ed;border-left:5px solid var(--accent);padding:12px;border-radius:10px;color:#4b5563;line-height:1.45}
.result{display:none;margin-top:20px;padding:20px;border-radius:16px;background:#f8fafc;border:1px solid var(--border)}
.correct{border-color:var(--good)!important;background:#ecfdf5!important}
.incorrect{border-color:var(--bad)!important;background:#fef2f2!important}
.review{padding:12px;margin-top:12px;border-radius:12px;border:1px solid var(--border);background:white}
.good{color:var(--good);font-weight:bold} .bad{color:var(--bad);font-weight:bold}
.empty{background:white;border:1px dashed var(--border);border-radius:16px;padding:28px;color:var(--muted);line-height:1.5}
@media(max-width:600px){header h1{font-size:1.85rem}main{padding:0 14px 40px}}
</style>
</head>
<body>
<header>
<h1>📚 Estudio para vagos</h1>
<p>Carpetas por módulo → temas → tests. Sin mezclar churras con merinas.</p>
</header>
<main>
<section id="home" class="screen active"><div class="grid" id="modules"></div></section>

<section id="moduleScreen" class="screen">
  <div class="topbar"><button class="back" onclick="showHome()">← Volver</button><h2 id="moduleTitle"></h2></div>
  <div id="folders" class="folder-list"></div>
</section>

<section id="folderScreen" class="screen">
  <div class="topbar"><button class="back" onclick="showModule()">← Volver a temas</button><h2 id="folderTitle"></h2></div>
  <div id="testsContent"></div>
</section>

<section id="quizScreen" class="screen">
  <div class="topbar"><button class="back" onclick="showFolder()">← Volver al tema</button><h2 id="quizTitle"></h2></div>
  <div class="quiz-panel">
    <div id="questions"></div>
    <button class="primary" onclick="correctQuiz()">Corregir test</button>
    <div id="result" class="result"></div>
  </div>
</section>
</main>

let currentModuleIndex = null;
let currentFolderIndex = null;
let currentTest = null;

function switchScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function renderModules(){
  const box = document.getElementById('modules');
  box.innerHTML = '';
  DATA.modules.forEach((m,i)=>{
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<div class="icon">${m.icon}</div><h2>${m.title}</h2><p>${m.folders.length ? m.folders.length + ' temas' : 'Pendiente de organizar'}</p>`;
    div.onclick = () => openModule(i);
    box.appendChild(div);
  });
}

function openModule(i){
  currentModuleIndex = i;
  const m = DATA.modules[i];
  document.getElementById('moduleTitle').textContent = m.title;
  const box = document.getElementById('folders');
  box.innerHTML = '';
  if(!m.folders.length){
    box.innerHTML = '<div class="empty">Todavía no hay temas dentro de esta carpeta.</div>';
  } else {
    m.folders.forEach((f,idx)=>{
      const div = document.createElement('div');
      div.className = 'folder-item';
      div.innerHTML = `<span>▸</span><span>${f.title}</span>`;
      div.onclick = () => openFolder(idx);
      box.appendChild(div);
    });
  }
  switchScreen('moduleScreen');
}

function openFolder(idx){
  currentFolderIndex = idx;
  const folder = DATA.modules[currentModuleIndex].folders[idx];
  document.getElementById('folderTitle').textContent = folder.title;
  const content = document.getElementById('testsContent');
  content.innerHTML = '';
  if(!folder.tests.length){
    content.innerHTML = '<div class="empty"><strong>Esta subcarpeta todavía no tiene tests.</strong><br>Los añadiremos cuando trabajemos este tema.</div>';
  } else {
    const principales = folder.tests.filter(t=>t.type==='principal');
    const minis = folder.tests.filter(t=>t.type==='mini');
    content.innerHTML = '<h3 class="section-title">📝 Tests principales</h3><div class="test-grid" id="principalGrid"></div><h3 class="section-title">🧪 Mini tests</h3><div class="test-grid" id="miniGrid"></div>';
    renderTestCards('principalGrid', principales);
    renderTestCards('miniGrid', minis);
  }
  switchScreen('folderScreen');
}

function renderTestCards(id, arr){
  const grid = document.getElementById(id);
  if(!arr.length){
    grid.innerHTML = '<div class="empty">No hay tests en esta categoría.</div>';
    return;
  }
  arr.forEach(t=>{
    const div = document.createElement('div');
    div.className = 'test-card';
    div.innerHTML = `<h3>${t.title}</h3><p>${t.type==='principal' ? 'Test principal tipo examen.' : 'Repaso específico.'}</p><span class="badge">${t.questions.length} preguntas</span>`;
    div.onclick = () => openQuiz(t);
    grid.appendChild(div);
  });
}

function openQuiz(test){
  currentTest = test;
  document.getElementById('quizTitle').textContent = test.title;
  const qbox = document.getElementById('questions');
  qbox.innerHTML = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('result').innerHTML = '';
  test.questions.forEach((item,i)=>{
    const div = document.createElement('div');
    div.className = 'question';
    div.innerHTML = `<h3>${i+1}. ${item.q}</h3>` +
      item.options.map((op,j)=>`<label class="option" id="q${i}o${j}"><input type="radio" name="q${i}" value="${j}"> ${String.fromCharCode(97+j)}) ${op}</label>`).join('') +
      `<button class="small" onclick="toggleExp(${i})">Modo explicación / Tengo una duda</button><div class="exp" id="exp${i}">${item.explanation}</div>`;
    qbox.appendChild(div);
  });
  switchScreen('quizScreen');
}

function toggleExp(i){
  const e = document.getElementById('exp'+i);
  e.style.display = e.style.display === 'block' ? 'none' : 'block';
}

function correctQuiz(){
  let score = 0;
  let review = '';
  currentTest.questions.forEach((item,i)=>{
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const val = selected ? parseInt(selected.value) : -1;
    document.querySelectorAll(`label[id^="q${i}o"]`).forEach(l=>l.classList.remove('correct','incorrect'));
    document.getElementById(`q${i}o${item.correct}`).classList.add('correct');
    if(val === item.correct){
      score++;
      review += `<div class="review"><span class="good">✓ Pregunta ${i+1} correcta.</span><br>${item.explanation}</div>`;
    } else {
      if(val >= 0) document.getElementById(`q${i}o${val}`).classList.add('incorrect');
      review += `<div class="review"><span class="bad">✗ Pregunta ${i+1} incorrecta.</span><br>Correcta: <strong>${String.fromCharCode(97+item.correct)}) ${item.options[item.correct]}</strong><br>${item.explanation}</div>`;
    }
  });
  const total = currentTest.questions.length;
  const mark = ((score/total)*10).toFixed(2);
  const result = document.getElementById('result');
  result.style.display = 'block';
  result.innerHTML = `<h3>Resultado</h3><p><strong>${score}/${total}</strong> correctas — Nota: <strong>${mark}/10</strong></p>${review}`;
  result.scrollIntoView({behavior:'smooth'});
}

function showHome(){ switchScreen('home'); }
function showModule(){ switchScreen('moduleScreen'); }
function showFolder(){ switchScreen('folderScreen'); }

renderModules();
